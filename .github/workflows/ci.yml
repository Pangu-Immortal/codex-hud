name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Generate preview
        run: swift run codex-hud --render-demo-screenshot docs/images/generated/ci-preview.png
